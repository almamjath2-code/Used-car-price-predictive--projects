<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Car Price Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: yellow;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Car Price Prediction 🚗</h2>

        <input id="brand" placeholder="Brand">
        <input id="fuel" placeholder="Fuel Type">
        <input id="model" placeholder="Car Model">
        <input id="year" type="number" placeholder="Year">
        <input id="kms" type="number" placeholder="KM Driven">
        <input id="city" placeholder="City">

        <button type="button" onclick="predictPrice()">Predict Price</button>

        <div class="result" id="result"></div>

    </div>

    <script>
        async function predictPrice() {

            try {
                const data = {
                    brand: document.getElementById("brand").value,
                    fuel_type: document.getElementById("fuel").value,
                    car_model_name: document.getElementById("model").value,
                    year_of_manufacture: parseInt(document.getElementById("year").value),
                    kms_driven: parseInt(document.getElementById("kms").value),
                    city: document.getElementById("city").value
                };

                const response = await fetch("http://usedcarpricepredictivejoin-env.eba-i7cbhdkd.ap-south-1.elasticbeanstalk.com/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": "mysecret3333"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                document.getElementById("result").innerHTML =
                    "Predicted Price: ₹ " + result.predicted_price;

            } catch (error) {
                console.log(error);
                document.getElementById("result").innerHTML =
                    "Error ❌ Backend not working";
            }
        }
    </script>

</body>

</html>
